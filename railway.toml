[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py collectstatic --noinput && gunicorn codegreen.wsgi --workers 2 --bind 0.0.0.0:$PORT"
preDeployCommand = "python manage.py migrate --run-syncdb && python manage.py setup_oauth && python manage.py load_ndvi && python manage.py createsuperuser --no-input || true"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
